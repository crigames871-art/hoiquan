name: Tự Động Cập Nhật Link Bóng Đá

on:
  schedule:
    # Cứ mỗi 2 tiếng hệ thống sẽ tự chạy (Tính theo giờ chuẩn UTC)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Nút bấm để bạn có thể tự kích hoạt chạy bằng tay bất cứ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Kiểm tra mã nguồn
      uses: actions/checkout@v3

    - name: Thiết lập Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cài đặt thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Chạy script lấy link
      run: python scraper.py

    - name: Tự động lưu file mới lên GitHub
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add bongda.m3u
        git commit -m "Bot tự động cập nhật danh sách trận đấu" || exit 0
        git push
