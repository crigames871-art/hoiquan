name: Tự Động Cập Nhật Link Bóng Đá

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

# --- ĐÂY LÀ CHÌA KHÓA: Cấp quyền GHI file cho Bot ---
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Kiểm tra mã nguồn
      uses: actions/checkout@v4 # Đã nâng cấp lên v4 để xóa cảnh báo vàng

    - name: Thiết lập Python
      uses: actions/setup-python@v5 # Đã nâng cấp lên v5
      with:
        python-version: '3.10'

    - name: Cài đặt thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Chạy script lấy link
      run: python scraper.py

    - name: Tự động lưu file mới lên GitHub
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add bongda.m3u
        # Nếu có link mới thì lưu, nếu y hệt cũ thì bỏ qua để không báo lỗi
        git commit -m "Bot tự động cập nhật danh sách trận đấu" || echo "Không có trận đấu mới, bỏ qua commit"
        git push
